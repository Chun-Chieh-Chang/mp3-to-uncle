<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube to MP3 - Premium Studio Downloader</title>
    <meta name="description" content="A professional, high-quality YouTube to MP3 downloader. Fast extraction with zero quality loss.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="static/css/style.css">
    <!-- PWA -->
    <link rel="manifest" href="static/manifest.json">
    <meta name="theme-color" content="#3A7CA8">
    <link rel="icon" type="image/png" href="static/icons/icon-512.png">
    <link rel="apple-touch-icon" href="static/icons/icon-512.png">
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <div class="header-top">
                <div class="logo-container">
                    <span class="material-symbols-outlined logo-icon">audio_file</span>
                    <h1 data-en="AudioStudio" data-zh="音訊工作室">音訊工作室</h1>
                </div>
                <button id="langToggle" class="btn-lang-toggle">
                    <span class="material-symbols-outlined">language</span>
                    <span id="langText">English</span>
                </button>
            </div>
            <p class="subtitle" data-en="Premium YouTube to MP3 Downloader" data-zh="高級 YouTube 轉 MP3 下載器">高級 YouTube 轉 MP3 下載器</p>
        </header>

        <section class="downloader-card">
            <div class="input-group">
                <span class="material-symbols-outlined input-icon">link</span>
                <input type="url" id="urlInput" placeholder="在此貼上 YouTube 連結..." data-en-placeholder="Paste YouTube link here..." data-zh-placeholder="在此貼上 YouTube 連結..." autocomplete="off">
            </div>
            
            <button id="fetchBtn" class="btn-primary">
                <span class="material-symbols-outlined">search</span>
                <span data-en="Analyze URL" data-zh="分析連結">分析連結</span>
            </button>

            <!-- Video Info Section (Hidden by default) -->
            <div id="videoInfoSection" class="video-info-section hidden">
                <div class="thumbnail-container">
                    <img id="videoThumb" src="" alt="Video Thumbnail">
                    <div class="duration-badge" id="videoDuration">0:00</div>
                </div>
                
                <div class="details-container">
                    <h2 id="videoTitle" class="video-title">Video Title</h2>
                    
                    <div class="controls-group">
                        <label for="qualitySelect" class="t-label" data-en="Audio Quality" data-zh="音訊品質">Audio Quality</label>
                        <select id="qualitySelect" class="custom-select">
                            <option value="320" data-en="320 kbps (Studio)" data-zh="320 kbps (錄音室級)">320 kbps (Studio)</option>
                            <option value="256" data-en="256 kbps (High)" data-zh="256 kbps (高品質)">256 kbps (High)</option>
                            <option value="192" data-en="192 kbps (Standard)" data-zh="192 kbps (標準品質)">192 kbps (Standard)</option>
                            <option value="128" selected data-en="128 kbps (Basic)" data-zh="128 kbps (基礎品質)">128 kbps (Basic)</option>
                        </select>
                    </div>

                    <button id="downloadBtn" class="btn-accent">
                        <span class="material-symbols-outlined">download</span>
                        <span data-en="Download MP3" data-zh="下載 MP3">Download MP3</span>
                    </button>
                    
                    <!-- Progress Section -->
                    <div id="progressSection" class="progress-section hidden">
                        <div class="progress-info">
                            <span id="progressStatusText" class="t-meta" data-en="Starting..." data-zh="正在開始...">Starting...</span>
                            <span id="progressPercentage" class="t-meta">0%</span>
                        </div>
                        <div class="progress-track">
                            <div id="progressBar" class="progress-fill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Error/Status Messages -->
            <div id="statusMessage" class="status-message hidden">
                <span class="material-symbols-outlined message-icon">info</span>
                <span id="statusText">Testing message</span>
            </div>
        </section>
    </main>

    <script src="static/js/script.js"></script>
</body>
</html>
