name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Static Files
        run: |
          mkdir public
          cp -r static public/
          cp templates/index.html public/index.html
          mv public/static/sw.js public/sw.js
          cp public/static/icons/icon-512.png public/favicon.ico
          # More robust replacement for any url_for('static', filename='...')
          sed -i "s|{{ url_for('static', filename='|static/|g" public/index.html
          sed -i "s|') }}||g" public/index.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
