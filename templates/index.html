<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube to MP3 - Premium Studio Downloader</title>
    <meta name="description" content="A professional, high-quality YouTube to MP3 downloader. Fast extraction with zero quality loss.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <div class="logo-container">
                <span class="material-symbols-outlined logo-icon">audio_file</span>
                <h1>AudioStudio</h1>
            </div>
            <p class="subtitle">Premium YouTube to MP3 Downloader</p>
        </header>

        <section class="downloader-card">
            <div class="input-group">
                <span class="material-symbols-outlined input-icon">link</span>
                <input type="url" id="urlInput" placeholder="Paste YouTube link here..." autocomplete="off">
            </div>
            
            <button id="fetchBtn" class="btn-primary">
                <span class="material-symbols-outlined">search</span>
                Analyze URL
            </button>

            <!-- Video Info Section (Hidden by default) -->
            <div id="videoInfoSection" class="video-info-section hidden">
                <div class="thumbnail-container">
                    <img id="videoThumb" src="" alt="Video Thumbnail">
                    <div class="duration-badge" id="videoDuration">0:00</div>
                </div>
                
                <div class="details-container">
                    <h2 id="videoTitle" class="video-title">Video Title</h2>
                    
                    <div class="controls-group">
                        <label for="qualitySelect" class="t-label">Audio Quality</label>
                        <select id="qualitySelect" class="custom-select">
                            <option value="320">320 kbps (Studio)</option>
                            <option value="256">256 kbps (High)</option>
                            <option value="192" selected>192 kbps (Standard)</option>
                            <option value="128">128 kbps (Basic)</option>
                        </select>
                    </div>

                    <button id="downloadBtn" class="btn-accent">
                        <span class="material-symbols-outlined">download</span>
                        Download MP3
                    </button>
                    
                    <!-- Progress Section -->
                    <div id="progressSection" class="progress-section hidden">
                        <div class="progress-info">
                            <span id="progressStatusText" class="t-meta">Starting...</span>
                            <span id="progressPercentage" class="t-meta">0%</span>
                        </div>
                        <div class="progress-track">
                            <div id="progressBar" class="progress-fill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Error/Status Messages -->
            <div id="statusMessage" class="status-message hidden">
                <span class="material-symbols-outlined message-icon">info</span>
                <span id="statusText">Testing message</span>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
